version: 2
updates:
  # groups
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      node-types:
        applies-to: version-updates
        pattersn:
          - '@types/node'
        update-types:
          - 'minor'
          - 'patch'
      angular:
        applies-to: version-updates
        patterns:
          - '@angular*'
        update-types:
          - 'minor'
          - 'patch'
